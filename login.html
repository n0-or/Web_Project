<!DOCTYPE html>
<html>
<head>
    <title>Adenor Login</title>
    <meta charset="UTF-8">
    <link type="text/css" rel="stylesheet" href="loginStyle.css">
</head>
<body class="login-body">

    <a href="home.html" class="back-home">&larr; Back to Home</a>

    <div class="login-container">
        
        <div class="login-logo">
            <img src="logoHOME.jpg" alt="Adenor Logo">
        </div>
        
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Login to unveil your signature scent</p>

        <form action="login_process.php" method="POST">
            <div class="input-group">
                <label for="username">Login / Email</label>
                <input type="text" id="username" name="user_login" placeholder="Enter your email or username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="user_password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="create-account-link">
            <a href="create-account.html">Click here to create account</a>
        </div>
        
    </div>

</body>
</html>
