<!DOCTYPE html>
<html>
<head>
    <title>Adenor - Create Account</title>
    <meta charset="UTF-8">
    <link type="text/css" rel="stylesheet" href="createStyle.css">
</head>
<body class="login-body">

    <a href="login.html" class="back-home">&larr; Back to Login</a>

    <div class="login-container register-container">
        
        <div class="login-logo">
            <img src="logoHOME.jpg" alt="Adenor Logo">
        </div>
        
        <h2>Begin Your Journey</h2>
        <p class="login-subtitle">Create an account to track orders and save your signature scents.</p>

        <form action="register_process.php" method="POST">
            
            <div class="name-row">
                <div class="input-group half-width">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="first_name" placeholder="First Name" required>
                </div>
                <div class="input-group half-width">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="last_name" placeholder="Last Name" required>
                </div>
            </div>

            <div class="input-group">
                <label for="email-username">Email / Username</label>
                <input type="text" id="email-username" name="email_username" placeholder="Enter email or username" required>
            </div>

            <div class="input-group">
                <label for="login-id">Login ID</label>
                <input type="text" id="login-id" name="login_id" placeholder="Choose a login ID" required>
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter your delivery address" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm Password" required>
            </div>

            <div class="input-group">
                <label for="credit-card">Credit card Number</label>
                <input type="text" id="credit-card" name="credit_card_number" placeholder="0000 0000 0000 0000" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="newsletter" name="subscribe_newsletter" value="yes">
                <label for="newsletter">Sign up for our newsletter</label>
            </div>

            <button type="submit" class="register-btn">Create Account</button>
        </form>

        <div class="create-account-link">
            <p style="color: #5A2F16; font-size: 14px; margin: 0;">Already have an account? <a href="login.html" style="font-weight: bold; text-decoration: underline;">Login here</a></p>
        </div>
        
    </div>

</body>
</html>
